{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Upload Material - Study Material Sharing System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
    <link rel="stylesheet" href="{% static 'css/upload.css' %}">
</head>

<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">📚</span>
      <span class="logo-text">StudyHub</span>
    </div>
    <nav>
      <a href="{% url 'home' %}">Home</a>
      <a href="{% url 'upload' %}" class="active">Upload</a>
      <a href="{% url 'materials' %}">Materials</a>
    </nav>
  </div>
</header>

<div class="container">

    <h2>Upload New Study Material</h2>

    <!-- ✅ FORM START -->
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="details-box">

            <h3>Material Information</h3>

            <!-- TITLE -->
            <label>Material Title</label>
            <input type="text" name="title" placeholder="Enter material title" required>
            <br><br>

            <!-- COURSE -->
            <label>Course</label>
           <select name="course" id="course" onchange="loadSemesters()">
    <option value="">Select Course</option>
    <option value="mca">MCA</option>
    <option value="msc">MSc</option>
    <option value="bsc">BSc</option>
    <option value="bba">BBA</option>
    <option value="mba">MBA</option>
</select>
            <br><br>

            <!-- SEMESTER -->
            <label>Semester</label>
            <select name="semester" id="semester" onchange="loadSubjects()" required>
                <option value="">Select Semester</option>
            </select>
            <br><br>

            <!-- SUBJECT -->
            <label>Subject</label>
            <select name="subject" id="subject" required>
                <option value="">Select Subject</option>
            </select>
            <br><br>

            <!-- DESCRIPTION -->
            <label>Description</label>
            <textarea name="description" placeholder="Write short description"></textarea>

        </div>

        <div class="upload-box">

            <h3>Upload File</h3>

            <input type="file" name="file" accept=".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.jpg,.jpeg,.png" required>

        </div>

        <div class="submit-box">
            <br>
            <button type="submit">Upload Material</button>
        </div>

    </form>
    <!-- ✅ FORM END -->

</div>

<script src="{% static 'js/upload.js' %}"></script>

</body>
</html>
